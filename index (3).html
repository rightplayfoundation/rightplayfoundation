<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anchor Point Athlete Foundation - Empowering athletes through mentorship during NCAA transitions">
    <title>Anchor Point Athlete Foundation - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --yellow: #FFD60A;
            --black: #0A0A0A;
            --grey: #6B7280;
            --light-grey: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A0A0A 0%, #1a1a1a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.03;
            z-index: 0;
        }

        .bg-circle-1 {
            width: 400px;
            height: 400px;
            background: var(--yellow);
            top: -100px;
            right: -100px;
            animation: float 20s ease-in-out infinite;
        }

        .bg-circle-2 {
            width: 300px;
            height: 300px;
            background: var(--yellow);
            bottom: -50px;
            left: -50px;
            animation: float 15s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            max-width: 800px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* Logo */
        .logo {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin: 0 auto 50px;
            filter: drop-shadow(0 10px 30px rgba(255, 214, 10, 0.2));
        }

        /* Main heading */
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: white;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .highlight {
            color: var(--yellow);
        }

        /* Tagline */
        .tagline {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: var(--light-grey);
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Description */
        .description {
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            line-height: 1.8;
            color: #D1D5DB;
            margin-bottom: 50px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Contact form section */
        .contact-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 214, 10, 0.2);
            margin-top: 50px;
        }

        .contact-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--yellow);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .contact-form {
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--light-grey);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--yellow);
            background: rgba(255, 255, 255, 0.12);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--grey);
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-button {
            width: 100%;
            padding: 18px 40px;
            background: var(--yellow);
            color: var(--black);
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Inter', sans-serif;
        }

        .submit-button:hover {
            background: #FFC300;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 214, 10, 0.3);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .form-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        .form-message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #86efac;
        }

        .form-message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        /* Footer */
        .footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            color: var(--grey);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .contact-section {
                padding: 30px 20px;
            }
            
            .logo {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>

    <div class="container">
        <!-- Logo -->
        <svg class="logo" viewBox="0 0 700 180" xmlns="http://www.w3.org/2000/svg">
            <g id="icon-mark">
                <circle cx="50" cy="80" r="28" fill="none" stroke="#FFD60A" stroke-width="6"/>
                <circle cx="50" cy="80" r="14" fill="#FFFFFF"/>
                <circle cx="110" cy="80" r="22" fill="none" stroke="#E5E7EB" stroke-width="5"/>
                <circle cx="110" cy="80" r="11" fill="#FFFFFF"/>
                <line x1="70" y1="80" x2="92" y2="80" stroke="#FFD60A" stroke-width="5" stroke-linecap="round"/>
            </g>
            <text x="160" y="95" font-family="'Bebas Neue', sans-serif" font-size="62" fill="#FFFFFF" letter-spacing="3">ANCHOR POINT</text>
            <text x="162" y="125" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#E5E7EB" letter-spacing="6">ATHLETE FOUNDATION</text>
        </svg>

        <!-- Main content -->
        <h1>Coming <span class="highlight">Soon</span></h1>
        <div class="tagline">Empowering Athletes Through Every Transition</div>
        
        <div class="description">
            We're building a mentorship network that connects current and transitioning NCAA athletes with former collegiate athletes who've navigated the same challenges. Because the right guidance at the right moment changes everything.
        </div>

        <!-- Contact section -->
        <div class="contact-section">
            <div class="contact-label">Get In Touch</div>
            
            <form class="contact-form" id="contactForm">
                <div class="form-group">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" name="name" class="form-input" placeholder="Your name" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="message" class="form-label">Message</label>
                    <textarea id="message" name="message" class="form-textarea" placeholder="Tell us about yourself and how we can help..." required></textarea>
                </div>

                <button type="submit" class="submit-button">Send Message</button>

                <div id="formMessage" class="form-message"></div>
            </form>
        </div>

        <script>
            document.getElementById('contactForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const message = document.getElementById('message').value;
                const formMessage = document.getElementById('formMessage');
                
                // Create mailto link with form data
                const subject = encodeURIComponent('Contact from Anchor Point Athlete Foundation Website');
                const body = encodeURIComponent(
                    `Name: ${name}\n\nEmail: ${email}\n\nMessage:\n${message}`
                );
                
                const mailtoLink = `mailto:anchorpointathletes@gmail.com?subject=${subject}&body=${body}`;
                
                // Open email client
                window.location.href = mailtoLink;
                
                // Show success message
                formMessage.textContent = 'Opening your email client...';
                formMessage.className = 'form-message success';
                formMessage.style.display = 'block';
                
                // Reset form
                setTimeout(() => {
                    this.reset();
                    formMessage.style.display = 'none';
                }, 3000);
            });
        </script>

        <!-- Footer -->
